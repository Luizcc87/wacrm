version: '3.8'

# -------------------------------------------------------------
# Stack: Local Postgres (Self-Hosted)
# -------------------------------------------------------------
# Variáveis principais (configure no .env):
# - APP_URL: A URL pública da aplicação
# - POSTGRES_PASSWORD: A senha do banco de dados local
# - DATABASE_URL: A string de conexão apontando para o container interno
#   Ex: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
# -------------------------------------------------------------

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  web:
    image: lc1868/wacrm:latest
    environment:
      APP_URL: ${APP_URL}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - db
    networks:
      - network_swarm_public
      - default
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  db-data:

networks:
  network_swarm_public:
    external: true
